version: "3.9"

services:
  redis:
    image: valkey/valkey:9.0.4-alpine

  api:
    build: ./api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis

  worker:
    build: ./worker
    command: celery -A tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    volumes:
      - /tmp:/tmp
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - redis
